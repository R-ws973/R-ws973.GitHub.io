<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>회원정보 입력</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1 {
            text-align: center;
        }

        .menu {
            text-align: center;
            margin-bottom: 20px;
        }

        .menu a {
            margin: 0 10px;
            text-decoration: none;
            color: blue;
            font-weight: bold;
        }

        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 12px;
        }

        table {
            width: 70%;
            margin: 0 auto;
        }

        th {
            background-color: #f2f2f2;
            width: 25%;
        }

        .btn-area {
            text-align: center;
            margin-top: 20px;
        }

        textarea {
            width: 95%;
        }
    </style>
</head>

<body>
    <h1>회원정보 입력</h1>

    <div class="menu">
        <a href="index.html">시간표</a>
        <a href="form.html">회원정보 입력</a>
        <a href="weather.html">날씨표</a>
    </div>

    <form>
        <table>
            <tr>
                <th>이름</th>
                <td><input type="text" name="name"></td>
            </tr>
            <tr>
                <th>비밀번호</th>
                <td><input type="password" name="pw"></td>
            </tr>
            <tr>
                <th>성별</th>
                <td>
                    <input type="radio" name="gender"> 남자
                    <input type="radio" name="gender"> 여자
                </td>
            </tr>
            <tr>
                <th>취미</th>
                <td>
                    <input type="checkbox" name="hobby"> 독서
                    <input type="checkbox" name="hobby"> 운동
                    <input type="checkbox" name="hobby"> 게임
                    <input type="checkbox" name="hobby"> 음악감상
                </td>
            </tr>
            <tr>
                <th>이메일</th>
                <td>
                    <input type="text" name="email"> @
                    <select name="domain">
                        <option>선택</option>
                        <option>naver.com</option>
                        <option>gmail.com</option>
                        <option>nate.com</option>
                    </select>
                </td>
            </tr>
            <tr>
                <th>자기소개</th>
                <td><textarea rows="5"></textarea></td>
            </tr>
            <tr>
                <th>파일첨부</th>
                <td><input type="file"></td>
            </tr>
        </table>

        <div class="btn-area">
            <button type="submit">확인</button>
            <button type="reset">다시쓰기</button>
        </div>
    </form>
</body>

</html>
