    <tr>
        <td>20</td>
        <td>55</td>
        <td>85</td>
        <td>3.2</td>
    </tr>
    <tr>
        <td>제주도</td>

        <td>58</td>
        <td>82</td>
        <td>4.1</td>
    </tr>
    </table>
</body>
</html>
