<!DOCTYPE html>
<html lang="en">
<head><title>순서가 있는 목록 태그에 대하여 알아봅시다.</title></head>
<body>

<!-- 숫자 형태의 목록 -->
    <h3>강아지 품종별 인기 순위</h3>
    <ol>
        <li>요크셔테이라</li>
        <li>패키니즈</li>
        <li>시츄</li>
        <li>토이 푸들</li>
    </ol>
<!-- 영문자 대문자 형태의 목록, 시작 번호 변경-->
    <h3>고양이 품종별 인기 순위</h3>
    <ol type="A" start="5">
        <li>페르시안</li>
        <li>메인쿤</li>
        <li value= "1"> 샴</li>
        <li>러시안 블루</li>
    </ol>

<!-- 로마자 대문자 형태의 목록 -->
    <h3>사료 인기준위</h3>
    <ol type="I">
        <li>로얄캐닌</li>
        <li>힐스</li>
        <li type="I">퓨리나</li>
        <li>웰니스</li>
    </ol>
</body>
</html>
